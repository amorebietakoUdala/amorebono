services:
    _defaults:
        # automatically injects dependencies in your services
        autowire: true
        # automatically registers your services as commands, event subscribers, etc.
        autoconfigure: true
        # this means you cannot fetch services directly from the container via $container->get()
        # if you need to do this, you can override this setting on individual services
        public: false

    AMREU\NikBundle\:
        resource: '../../*'
        exclude:
            - '../../Resources/'
            - '../../DependencyInjection/'
            - '../../NikBundle.php'

    AMREU\NikBundle\Service\NikService:
        class: AMREU\NikBundle\Service\NikService
        arguments: ['@http_client', '@monolog.logger', '$apiKey', '$endPoint']
        
    AMREU\NikBundle\Controller\NikController:
        class: AMREU\NikBundle\Controller\NikController
        tags: ['controller.service_arguments']
        arguments: ['@AMREU\NikBundle\Service\NikService', '$successUri']
            

            
